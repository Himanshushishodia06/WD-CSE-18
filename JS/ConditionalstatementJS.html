<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Statement in JS</title>
</head>
<body>
    <script>
        // conditional statements are used to perform different actions based on different conditions.

        // if statement
        let age=19;
        if(age>=18){
            console.log("You are eligible to vote");
        }

        // if else statement
        let marks=95;
        if(marks>=90){
            console.log("You got A grade");
        }else{
            console.log("You got B grade");
        }

        // if else if statement
        let day=2;
        if(day==1){
            console.log("Monday");
        }else if(day==2){
            console.log("Tuesday");
        }else if(day==3){
            console.log("Wednesday");
        }
        else if(day==4){
            console.log("Thursday");
        }
        else if(day==5){
            console.log("Friday");
        }
        else if(day==6){
            console.log("Saturday");
        }
        else if(day==7){
            console.log("Sunday");
        }else{
            console.log("Invalid day");
        }

        //if else if statement for grading system
        let score=91;
        if(score>=90){
            console.log("You got A grade");
        }
        else if(score>=80 && score<90){
            console.log("You got B grade");
        }
        else if(score>=70 && score<80){
            console.log("You got C grade");
        }
        else if(score>=60 && score<70){
            console.log("You got D grade");
        }
        else{
            console.log("You got F grade");
        }

        //average marks code by array

        let marksArray=[85,90,80,92,88];
        let totalMarks=0;

        //array ka sum k liye for loop
        for(let i=0;i<marksArray.length;i++){
            totalMarks+=marksArray[i];
        }
        //avg marks nikalne k liye total marks ko array ki length se divide krna hoga
        let averageMarks=totalMarks/marksArray.length;
        console.log("Average marks: "+averageMarks);
        


        // switch statement
        let Day ="Monday";
        switch(Day){
            case "Monday":
                console.log("It's Monday");
                break;
            case "Tuesday":
                console.log("It's Tuesday");
                break;
            case "Wednesday":
                console.log("It's Wednesday");
                break;
            default:
                console.log("Invalid day");
        }

    </script>
</body>
</html>
