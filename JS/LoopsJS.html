<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JS</title>
</head>
<body>
    <script>
        // loops are used to execute a block of code repeatedly until a specified condit

        // for loop
        let studentList=["Himanshu","Aryan","Shourya","Aditya"];
        for(let i=0; i<studentList.length; i++){
            console.log(studentList[i]);
        }

        // while loop
        let x=0;
        while(x<studentList.length){
            console.log(studentList[x]);
            x++;
        }

        //for of loop
        for(let y of studentList){
            console.log(y);
        }

    </script>
</body>
</body>
</html>
